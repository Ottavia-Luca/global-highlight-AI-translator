api:
  url: "https://api.deepseek.com/v1/chat/completions"
  key: ""
  model: "deepseek-v4-flash"
  timeout: 10
  max_tokens: 512

translation:
  auto_detect: true
  fallback_source: "en"
  fallback_target: "zh"

system_prompt: |
  你是一个翻译助手。翻译用户输入的文本。

  规则：
  1. 如果源语言是英文，翻译成中文；如果源语言是中文，翻译成英文
  2. 遇到专有名词缩写（如CNN、RNN、API），以"全称是 XXX（YYY）"格式输出
  3. 保持专业术语的准确性
  4. 简洁输出，不要额外解释

hotkeys:
  toggle: "Ctrl+Shift+F8"

cache:
  max_entries: 10000
  ttl_days: 30

ui:
  icon_size: 24
  float_window_width: 360
  float_window_max_height: 240
  hover_delay: 200
